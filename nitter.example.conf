[Server]
hostname = "nitter.net"      # for generating links, change this to your own domain/ip
title = "nitter"
address = "0.0.0.0"
port = 8080
https = false                # disable to enable cookies when not using https
httpMaxConnections = 100
staticDir = "./public"

[Cache]
listMinutes = 240            # how long to cache list info (not the tweets, so keep it high)
rssMinutes = 10              # how long to cache rss queries
redisHost = "nitter-redis"   # Docker Compose Redis service
redisPort = 6379
redisPassword = ""
redisConnections = 20        # minimum open connections in pool
redisMaxConnections = 30
# new connections are opened when none are available, but if the pool size
# goes above this, they're closed when released. don't worry about this unless
# you receive tons of requests per second

[Config]
hmacKey = "secretkey"        # CHANGE THIS to a unique random value (e.g. `openssl rand -hex 32`); signs media urls
base64Media = false          # use base64 encoding for proxied media urls
enableRSS = true             # master switch, set to false to disable all RSS feeds
enableRSSUserTweets = true   # /@user/rss
enableRSSUserReplies = true  # /@user/with_replies/rss
enableRSSUserMedia = true    # /@user/media/rss
enableRSSSearch = true       # /search/rss and /@user/search/rss
enableRSSList = true         # list RSS feeds
enableDebug = false          # enable request logs and debug endpoints (/.sessions)
proxy = ""                   # http/https url, e.g. http://user:pass@pr.oxylabs.io:7777
proxyAuth = ""               # optional; prefer embedding basic-auth credentials in proxy
proxySessionPerAccount = true # add -sessid-<account> to proxy username for sticky per-account Oxylabs IPs
apiProxy = ""                # nitter-proxy host, e.g. localhost:7000
disableTid = true            # enable this if cookie-based auth is failing
maxConcurrentReqs = 1        # max requests at a time per session to avoid account burn
minRequestIntervalMs = 3000  # minimum delay before reusing the same account session
errorCooldownMs = 60000      # per-account cooldown after transient network/429 errors
rateLimitRemainingBuffer = 10 # stop using an endpoint before it reaches zero remaining calls
maxRetries = 1               # max number of retries on rate limit errors
retryDelayMs = 150           # delay in ms between retries

# Change default preferences here, see src/prefs_impl.nim for a complete list
[Preferences]
theme = "Nitter"
replaceTwitter = "nitter.net"
replaceYouTube = "piped.video"
replaceReddit = "teddit.net"
proxyVideos = true
hlsPlayback = false
infiniteScroll = false
