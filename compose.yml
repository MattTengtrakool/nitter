services:
  nitter-config:
    build:
      context: .
      dockerfile: Dockerfile.config
    image: nitter-local-config:latest
    container_name: nitter-config
    volumes:
      - nitter-config:/config
    restart: "no"

  nitter:
    build: .
    image: nitter-local-api:latest
    container_name: nitter
    ports:
      - "127.0.0.1:8080:8080" # Replace with "8080:8080" if you don't use a reverse proxy
    environment:
      NITTER_PROXY: ${NITTER_PROXY:-}
      NITTER_PROXY_AUTH: ${NITTER_PROXY_AUTH:-}
      NITTER_PROXY_SESSION_PER_ACCOUNT: ${NITTER_PROXY_SESSION_PER_ACCOUNT:-true}
      NITTER_API_PROXY: ${NITTER_API_PROXY:-http://nitter-api-proxy:7000}
      NITTER_CONF_FILE: /config/nitter.conf
      NITTER_SESSIONS_FILE: ${NITTER_SESSIONS_FILE:-/config/sessions.jsonl}
      NITTER_MAX_CONCURRENT_REQS: ${NITTER_MAX_CONCURRENT_REQS:-1}
      NITTER_MIN_REQUEST_INTERVAL_MS: ${NITTER_MIN_REQUEST_INTERVAL_MS:-3000}
      NITTER_ERROR_COOLDOWN_MS: ${NITTER_ERROR_COOLDOWN_MS:-60000}
      NITTER_RATE_LIMIT_REMAINING_BUFFER: ${NITTER_RATE_LIMIT_REMAINING_BUFFER:-10}
    volumes:
      - nitter-config:/config:ro
    depends_on:
      nitter-config:
        condition: service_completed_successfully
      nitter-redis:
        condition: service_started
      nitter-api-proxy:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: wget -nv --tries=1 --spider http://127.0.0.1:8080/api/v1/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 2
    user: "998:998"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nitter-api-proxy:
    build:
      context: .
      dockerfile: Dockerfile.api-proxy
    image: nitter-local-api-proxy:latest
    container_name: nitter-api-proxy
    environment:
      NITTER_PROXY: ${NITTER_PROXY:-}
      NITTER_PROXY_SESSION_PER_ACCOUNT: ${NITTER_PROXY_SESSION_PER_ACCOUNT:-true}
      API_PROXY_HOST: 0.0.0.0
      API_PROXY_PORT: 7000
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nitter-redis:
    image: redis:6-alpine
    container_name: nitter-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - nitter-redis:/data
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 30s
      timeout: 5s
      retries: 2
    user: "999:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  nitter-config:
  nitter-redis:
